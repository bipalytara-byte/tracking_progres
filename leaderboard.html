<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Quest — Guild Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --parch:#f5eed8;--parch2:#ede2c0;--parch3:#d4c49a;
  --ink:#2c1810;--ink2:#4a3020;--ink3:#6b4c30;
  --a1:#e8534a;--a2:#4a90d9;--a3:#52b788;--a4:#f4a261;--a5:#9b59b6;
  --gold:#c9982a;--border:#b89a6a;--border2:#8b6a3a;
}
body{background:var(--parch);color:var(--ink);font-family:'Nunito',sans-serif;min-height:100vh;padding:1.5rem}
.wrap{max-width:680px;margin:0 auto}
.rpg-h1{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:2px}
.rpg-h3{font-family:'Cinzel',serif;font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.tab-row{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.tab-btn{padding:7px 16px;background:var(--parch3);color:var(--ink3);border:2px solid var(--border);border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
.tab-btn.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.lb-row{display:flex;align-items:center;gap:12px;background:var(--parch2);border:2px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:border-color .15s}
.lb-row.rank-1{border-color:var(--gold)}
.lb-row.rank-2{border-color:#aaa}
.lb-row.rank-3{border-color:#cd7f32}
.lb-bar-wrap{height:7px;background:var(--parch3);border-radius:4px;flex:1;border:1px solid var(--border)}
.lb-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.badge-card{background:var(--parch2);border:2px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px}
.badge-card.locked{opacity:.4}
.back-link{color:var(--ink3);font-size:13px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:1.25rem;font-family:'Nunito',sans-serif}
.back-link:hover{color:var(--gold)}
.divider{border:none;border-top:2px solid var(--border);margin:1.25rem 0}
.xp-box{background:var(--parch2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem}
.xp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--parch3)}
.xp-row:last-child{border-bottom:none}
.loading-spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <a href="index.html" class="back-link">← Kembali ke Portal</a>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px">
    <div class="rpg-h1">🏆 Guild Leaderboard</div>
    <button onclick="refreshData()" style="background:transparent;color:var(--ink3);border:2px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700">
      ↻ Refresh
    </button>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" onclick="setTab('board',this)">🏆 Papan Peringkat</button>
    <button class="tab-btn" onclick="setTab('badge',this)">🏅 Daftar Badge</button>
    <button class="tab-btn" onclick="setTab('xp',this)">⭐ Sistem XP</button>
  </div>

  <div id="tab-board">
    <div class="rpg-h3" style="margin-bottom:10px">Ranking berdasarkan total XP</div>
    <div id="leaderboardList"><div style="text-align:center;padding:2rem"><div class="loading-spin"></div></div></div>
  </div>
  <div id="tab-badge" style="display:none">
    <div class="rpg-h3" style="margin-bottom:10px">Raih semua badge untuk membuktikan kehebatan guild!</div>
    <div class="badge-grid" id="badgeList"></div>
  </div>
  <div id="tab-xp" style="display:none">
    <div class="rpg-h3" style="margin-bottom:10px">Cara mendapatkan XP</div>
    <div id="xpRules"></div>
  </div>

  <div class="divider"></div>
  <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
    <a href="index.html" style="color:var(--ink3);font-size:13px;font-weight:700;text-decoration:none;border:2px solid var(--border);border-radius:8px;padding:7px 16px;font-family:'Nunito',sans-serif">⚔️ Portal Mahasiswa</a>
    <a href="dosen.html" style="color:var(--ink3);font-size:13px;font-weight:700;text-decoration:none;border:2px solid var(--border);border-radius:8px;padding:7px 16px;font-family:'Nunito',sans-serif">🎓 Panel Dosen</a>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyg7awq1E6S3Qp_d1pCPIyW8bn9kuxrrPsLenVJaNRekAPsb5jNbsO4Gakk250V8Fxr/exec";

const PARTIES = [
  {key:"Kelompok 1",color:"#e74c3c",label:"Iron Vanguard", el:"fire",   kode:"PARTY1-MV"},
  {key:"Kelompok 2",color:"#3498db",label:"Storm Arcane",  el:"thunder",kode:"PARTY2-MV"},
  {key:"Kelompok 3",color:"#27ae60",label:"Earth Titan",   el:"earth",  kode:"PARTY3-MV"},
  {key:"Kelompok 4",color:"#9b59b6",label:"Shadow Blade",  el:"shadow", kode:"PARTY4-MV"},
  {key:"Kelompok 5",color:"#f39c12",label:"Golden Sage",   el:"light",  kode:"PARTY5-MV"}
];

const BADGE_DEFS = [
  {id:"first_blood",icon:"⚔️",  name:"First Blood",      desc:"Pertama kali mengirim laporan",                  xp:50 },
  {id:"streak2",    icon:"🔥",  name:"On Fire",           desc:"Laporan 2 minggu berturut-turut",                xp:100},
  {id:"streak4",    icon:"💎",  name:"Diamond Streak",    desc:"Laporan lengkap 4 minggu berurutan",             xp:300},
  {id:"full100",    icon:"⭐",  name:"Completionist",     desc:"Minimal 1 anggota capai progres 100%",           xp:200},
  {id:"game_info",  icon:"📜",  name:"Lore Keeper",       desc:"Kelompok sudah mengisi info game lengkap",       xp:100},
  {id:"avg75",      icon:"🏹",  name:"Sharp Archer",      desc:"Rata-rata progres kelompok mencapai 75%+",       xp:200},
  {id:"top1",       icon:"👑",  name:"Guild Master",      desc:"Menjadi kelompok #1 di leaderboard",             xp:0  },
  {id:"early_bird", icon:"🌅",  name:"Early Bird",        desc:"Pertama submit laporan di antara semua kelompok",xp:75 },
  {id:"all_member", icon:"👥",  name:"Full Party",        desc:"Semua anggota sudah submit minimal 1 laporan",   xp:150}
];

const XP_RULES = [
  {icon:"📋",label:"Kirim laporan mingguan",       xp:"+100 XP / laporan"},
  {icon:"💯",label:"Progres 100% dalam laporan",   xp:"+50 XP bonus"},
  {icon:"📜",label:"Isi info game kelompok",        xp:"+100 XP (sekali)"},
  {icon:"🔥",label:"Streak 2 minggu berturut",     xp:"+100 XP bonus"},
  {icon:"💎",label:"Streak 4 minggu penuh",        xp:"+300 XP bonus"},
  {icon:"⭐",label:"Ada anggota capai 100%",       xp:"+200 XP bonus"},
  {icon:"🏹",label:"Avg progres kelompok 75%+",    xp:"+200 XP bonus"},
  {icon:"🌅",label:"Submit pertama hari itu",      xp:"+75 XP bonus"},
  {icon:"👥",label:"Semua anggota sudah laporan",  xp:"+150 XP bonus"}
];

const LEVEL_THRESHOLDS = [0,200,500,900,1400,2000,2700,3500,4400,5400];
const LEVEL_NAMES      = ["Novice","Apprentice","Adventurer","Knight","Champion","Hero","Legend","Myth","Epic","Godlike"];

var allProgress  = [];
var allMembers   = {};
var gameInfos    = {};
var jumlahMinggu = 8;

// ── GAS (GET only) ────────────────────────────────────────────
function gasGet(payload) {
  const q = new URLSearchParams({data: JSON.stringify(payload)});
  return fetch(GAS_URL + "?" + q.toString(), {method:"GET", redirect:"follow"})
    .then(r => r.json()).catch(() => null);
}

function refreshData() {
  document.getElementById("leaderboardList").innerHTML = `<div style="text-align:center;padding:2rem"><div class="loading-spin"></div></div>`;

  gasGet({action:"initCheck"}).then(res => {
    if (res && res.result) jumlahMinggu = res.result.jumlahMinggu || 8;
  });

  // Load progress semua kelompok
  gasGet({action:"getAllProgress"}).then(res => {
    if (res && res.result) allProgress = res.result;
  });

  // Load members + game info semua kelompok
  let done = 0;
  PARTIES.forEach(p => {
    gasGet({action:"getMembers",   kelompok:p.key}).then(r => { if(r&&r.result) allMembers[p.key]=r.result; checkDone(); });
    gasGet({action:"getGameInfo",  kelompok:p.key}).then(r => { if(r&&r.result) gameInfos[p.key]=r.result;  checkDone(); });
  });
  function checkDone() { done++; if(done>=PARTIES.length*2) renderAll(); }
}

// ── XP CALCULATION ────────────────────────────────────────────
function calcParty(party) {
  const logs    = allProgress.filter(l => l.kelompok === party.key);
  const weeks   = Array.from({length:jumlahMinggu}, (_,i) => "Minggu "+(i+1));
  let xp = 0, badges = [];
  const memberSet = {};

  logs.forEach(l => {
    xp += 100;
    const pct = parseInt(String(l.progres||"0").replace("%",""))||0;
    if (pct >= 100) xp += 50;
    memberSet[l.nim||l.nama] = true;
  });

  // Badge: game info
  const game = gameInfos[party.key];
  if (game && game.judul) { xp += 100; badges.push("game_info"); }

  // Badge: first blood
  if (logs.length > 0) badges.push("first_blood");

  // Badge: streak
  const weekSet = {};
  logs.forEach(l => weekSet[l.minggu] = true);
  let cur = 0, maxC = 0;
  weeks.forEach(w => { if(weekSet[w]){cur++;if(cur>maxC)maxC=cur;}else cur=0; });
  if (maxC >= 2) { badges.push("streak2"); xp += 100; }
  if (maxC >= 4) { badges.push("streak4"); xp += 300; }

  // Badge: full100
  const has100 = logs.some(l => (parseInt(String(l.progres||"0").replace("%",""))||0) >= 100);
  if (has100) { badges.push("full100"); xp += 200; }

  // Badge: avg75
  const pVals = logs.map(l => parseInt(String(l.progres||"0").replace("%",""))||0);
  const avg   = pVals.length ? Math.round(pVals.reduce((a,b)=>a+b,0)/pVals.length) : 0;
  if (avg >= 75) { badges.push("avg75"); xp += 200; }

  // Badge: all_member
  const members = (allMembers[party.key]||[]).filter(m=>m.nama);
  if (members.length > 0 && Object.keys(memberSet).length >= members.length) { badges.push("all_member"); xp += 150; }

  // Badge: early_bird (paling awal submit)
  if (logs.length > 0 && allProgress.length > 0) {
    const earliest = allProgress.reduce((a,b) => new Date(a.waktu_submit) < new Date(b.waktu_submit) ? a : b);
    if (earliest && earliest.kelompok === party.key) { badges.push("early_bird"); xp += 75; }
  }

  return {xp, badges, avg, logCount:logs.length, memberCount:Object.keys(memberSet).length};
}

// ── SPRITE ───────────────────────────────────────────────────
function drawSprite(el, color, size) {
  const extras = {
    fire:    `<polygon points="35,10 50,2 65,10 60,25 40,25" fill="${color}" opacity=".5"/>`,
    thunder: `<polygon points="50,4 59,22 52,22 61,40 41,22 48,22" fill="#FFD700" opacity=".9"/>`,
    earth:   `<rect x="13" y="40" width="8" height="28" rx="3" fill="#8B6914"/><rect x="9" y="36" width="16" height="8" rx="3" fill="#8B6914"/>`,
    shadow:  `<ellipse cx="50" cy="10" rx="16" ry="7" fill="${color}" opacity=".5"/>`,
    light:   `<circle cx="50" cy="30" r="24" fill="none" stroke="${color}" stroke-width="2.5" opacity=".35"/>`
  };
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">
    <circle cx="50" cy="30" r="18" fill="${color}" opacity=".9"/>
    <rect x="38" y="44" width="24" height="30" rx="5" fill="${color}" opacity=".8"/>
    <rect x="20" y="46" width="14" height="22" rx="5" fill="${color}" opacity=".7"/>
    <rect x="66" y="46" width="14" height="22" rx="5" fill="${color}" opacity=".7"/>
    <rect x="34" y="74" width="13" height="18" rx="5" fill="${color}" opacity=".7"/>
    <rect x="53" y="74" width="13" height="18" rx="5" fill="${color}" opacity=".7"/>
    ${extras[el]||""}
  </svg>`;
}

function getLevel(xp) {
  let lv = 0;
  for (let i = LEVEL_THRESHOLDS.length-1; i>=0; i--) { if(xp>=LEVEL_THRESHOLDS[i]){lv=i;break;} }
  return {level:lv+1, name:LEVEL_NAMES[lv]};
}
function getLvPct(xp) {
  let lv = 0;
  for (let i = LEVEL_THRESHOLDS.length-1; i>=0; i--) { if(xp>=LEVEL_THRESHOLDS[i]){lv=i;break;} }
  const curr=LEVEL_THRESHOLDS[lv], next=LEVEL_THRESHOLDS[lv+1]||(curr+1000);
  return Math.round(((xp-curr)/(next-curr))*100);
}

function setTab(tab, btn) {
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("tab-board").style.display = tab==="board"?"block":"none";
  document.getElementById("tab-badge").style.display = tab==="badge"?"block":"none";
  document.getElementById("tab-xp").style.display    = tab==="xp"   ?"block":"none";
}

function renderLeaderboard() {
  const data = PARTIES.map(p => { const d=calcParty(p); return {party:p,...d}; });
  data.sort((a,b) => b.xp-a.xp);
  const rankIcons  = ["👑","🥈","🥉","4","5"];
  const rankColors = ["var(--gold)","#aaa","#cd7f32","var(--ink3)","var(--ink3)"];
  const rankClass  = ["rank-1","rank-2","rank-3","",""];
  if (data[0]) data[0].badges.push("top1");

  document.getElementById("leaderboardList").innerHTML = data.map((d,i) => {
    const lv  = getLevel(d.xp);
    const pct = getLvPct(d.xp);
    const bIcons = d.badges.slice(0,6).map(bid => {
      const b = BADGE_DEFS.find(x=>x.id===bid);
      return b ? `<span title="${b.name}" style="font-size:14px">${b.icon}</span>` : "";
    }).join("");
    return `<div class="lb-row ${rankClass[i]}">
      <div style="font-size:${i<3?"22px":"14px"};font-weight:bold;width:32px;text-align:center;flex-shrink:0;color:${rankColors[i]}">${rankIcons[i]}</div>
      <div style="flex-shrink:0">${drawSprite(d.party.el,d.party.color,44)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:bold;color:var(--ink);margin-bottom:2px">${d.party.key} <span style="color:${d.party.color};font-size:11px;font-weight:normal">— ${d.party.label}</span></div>
        <div style="font-size:10px;color:var(--ink3);margin-bottom:4px">${d.logCount} laporan &bull; ${d.memberCount} anggota &bull; avg ${d.avg}%</div>
        ${bIcons?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px">${bIcons}</div>`:""}
        <div style="display:flex;align-items:center;gap:8px">
          <div class="lb-bar-wrap"><div class="lb-bar-fill" style="width:${pct}%;background:${d.party.color}"></div></div>
          <span style="font-size:10px;color:var(--ink3);white-space:nowrap">Lv.${lv.level} ${lv.name}</span>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;min-width:56px">
        <div style="font-size:18px;font-weight:bold;color:${d.xp>0?d.party.color:"var(--ink3)"}">${d.xp}</div>
        <div style="font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px">XP</div>
      </div>
    </div>`;
  }).join("");
}

function renderBadges() {
  const allUnlocked = PARTIES.flatMap(p => calcParty(p).badges);
  document.getElementById("badgeList").innerHTML = BADGE_DEFS.map(b => {
    const got = allUnlocked.includes(b.id);
    return `<div class="badge-card ${got?"":"locked"}">
      <div style="font-size:22px;flex-shrink:0">${b.icon}</div>
      <div>
        <div style="font-size:12px;font-weight:bold;color:var(--ink);margin-bottom:2px">${b.name}${b.xp>0?` <span style="color:var(--gold);font-size:10px">+${b.xp} XP</span>`:""}</div>
        <div style="font-size:10px;color:var(--ink3);line-height:1.4">${b.desc}</div>
        <div style="font-size:10px;margin-top:3px;color:${got?"var(--a3)":"var(--ink3)"}">${got?"✓ Sudah diraih":"🔒 Belum diraih"}</div>
      </div>
    </div>`;
  }).join("");
}

function renderXP() {
  document.getElementById("xpRules").innerHTML =
    `<div class="xp-box">${XP_RULES.map(r=>`<div class="xp-row"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:16px">${r.icon}</span><span style="font-size:12px;color:var(--ink2)">${r.label}</span></div><span style="font-size:12px;font-weight:bold;color:var(--gold);white-space:nowrap">${r.xp}</span></div>`).join("")}</div>
    <div class="rpg-h3" style="margin-bottom:8px">Level Progression</div>
    <div class="xp-box">${LEVEL_NAMES.map((name,i)=>`<div class="xp-row"><span style="font-size:11px;color:var(--ink2)">Lv.${i+1} — ${name}</span><span style="font-size:11px;color:var(--ink3)">${LEVEL_THRESHOLDS[i]} XP</span></div>`).join("")}</div>`;
}

function renderAll() { renderLeaderboard(); renderBadges(); renderXP(); }

refreshData();
</script>
</body>
</html>
